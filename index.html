<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Reminders Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Multi-Alarm Assistant</h1>
        <div class="clock-display" id="liveClock">00:00:00</div>
        
        <div class="form-group">
            <input type="time" id="alarmTime" required>
            <button onclick="addAlarm()">Add Alarm</button>
        </div>

        <ul class="alarm-list" id="alarmList"></ul>
    </div>

    <!-- Alarm Trigger Alert Interface -->
    <div class="overlay" id="alarmOverlay">
        <div class="modal">
            <h2>🚨 REMINDER 🚨</h2>
            <p>Your scheduled alarm at <span id="triggeredTime" style="font-weight:bold;">00:00</span> is triggering right now!</p>
            <button class="btn-dismiss" onclick="dismissAlarm()">Dismiss Alert</button>
        </div>
    </div>

    <script src="alarm.js"></script>
</body>
</html>
